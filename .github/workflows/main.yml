name: Deploy to VPS on merge to main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key + debug format
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -l ~/.ssh/deploy_key
          head -n 3 ~/.ssh/deploy_key     # начало ключа
          tail -n 3 ~/.ssh/deploy_key      # конец ключа — должен быть END + пустая строка
          file ~/.ssh/deploy_key           # должно показать "PEM RSA private key" или "OpenSSH private key"
          ssh-keygen -y -P "" -f ~/.ssh/deploy_key > /dev/null 2>&1 && echo "Key OK" || echo "Key INVALID"
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.PROJECT_PATH }} || { echo "Директория не найдена"; exit 1; }

            echo "Подтягиваем изменения..."
            git pull origin main

            echo "Обновляем зависимости..."
            npm install

            echo "Сборка Next.js..."
            npm run build

            echo "Перезапуск PM2..."
            pm2 reload ${{ secrets.PM2_PROCESS_NAME }} || pm2 restart ${{ secrets.PM2_PROCESS_NAME }}

            echo "Деплой завершён!"
            pm2 status
          EOF
